<div class="pg">
  <div class="pg-head">
    <h1>Sales Invoices</h1>
    <button mat-flat-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon> New Invoice
    </button>
  </div>

  <mat-card appearance="outlined" class="table-card">
    <table mat-table [dataSource]="rows" class="w-full">

      <ng-container matColumnDef="number">
        <th mat-header-cell *matHeaderCellDef>Invoice #</th>
        <td mat-cell *matCellDef="let row">
          <a [routerLink]="row.id" class="doc-link">{{ row.number }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="contact">
        <th mat-header-cell *matHeaderCellDef>Contact</th>
        <td mat-cell *matCellDef="let row">{{ row.contactName }}</td>
      </ng-container>

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.date | formatDate }}</td>
      </ng-container>

      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef>Due Date</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.dueDate | formatDate }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <app-status-badge [status]="row.status" />
        </td>
      </ng-container>

      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef class="num">Total</th>
        <td mat-cell *matCellDef="let row" class="num muted">{{ row.total | formatMoney }}</td>
      </ng-container>

      <ng-container matColumnDef="amountDue">
        <th mat-header-cell *matHeaderCellDef class="num">Amount Due</th>
        <td mat-cell *matCellDef="let row" class="num">
          @if (row.amountDue > 0) {
            <strong>{{ row.amountDue | formatMoney }}</strong>
          } @else {
            <span class="muted">—</span>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols"
          class="click-row" [routerLink]="row.id"></tr>
    </table>
  </mat-card>
</div>
