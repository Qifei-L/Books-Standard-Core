<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="sidenav">

    <!-- Brand -->
    <div class="brand-area">
      <div class="brand-icon-wrap">
        <mat-icon>account_balance</mat-icon>
      </div>
      <span class="brand-name">Books Standard</span>
    </div>

    <!-- Nav -->
    <nav class="nav-section">
      @for (item of sidebarNav; track item.to) {
        <a [routerLink]="item.to"
           routerLinkActive="nav-active"
           [routerLinkActiveOptions]="item.to === '/' ? {exact:true} : {exact:false}"
           class="nav-item">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="footer-info">
        <span class="company-name">{{ data.companyName }}</span>
        <span class="fiscal-year">FY26</span>
      </div>
      <button type="button" class="logout-btn" (click)="logout()" title="Sign out">
        <mat-icon>logout</mat-icon>
      </button>
    </div>

  </mat-sidenav>

  <mat-sidenav-content class="main-area">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
